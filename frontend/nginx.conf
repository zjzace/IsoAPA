limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=8r/s;
limit_req_zone $binary_remote_addr zone=search_per_ip:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=download_per_ip:10m rate=1r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    server_tokens off;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend_upstream http://backend:8000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    location = /openapi.json { return 404; }
    location ^~ /docs { return 404; }
    location ^~ /redoc { return 404; }
    location ~ /\. {
        return 404;
    }

    location ~ ^/api/v1/(search|autocomplete)$ {
        limit_req zone=search_per_ip burst=12 nodelay;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location ^~ /api/v1/download/ {
        limit_req zone=download_per_ip burst=3;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /api/ {
        limit_req zone=api_per_ip burst=24 nodelay;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
